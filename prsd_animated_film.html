<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRS'D — Pressed to Perfection (Animated Film)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,900&display=swap" rel="stylesheet">
<style>
:root{
  /* Brand colors — exact match to PRS'D website CSS */
  --teal-deep:#003D3E;
  --teal:#00BABE;
  --teal-mint:#00BC90;
  --teal-darker:#001818;
  --teal-mid:#006669;
  --amber:#FBB03B;
  --gold:#F5C842;
  --gold-light:#FFD560;
  --cream:#FFF8E7;
  --dough:#f3d9a4;
  --dough-shadow:#c89968;
  --caramel:#c8860d;
  --waffle-gold:#E8A53A;
  --waffle-deep:#a85f15;
  --pearl:#fffaf0;
  --ink:#001010;
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{
  background:#000;
  font-family:'DM Sans',-apple-system,sans-serif;
  overflow:hidden;
  height:100%;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
}

.film{
  position:relative;
  width:min(100vw, calc(100vh * 16/9));
  height:min(100vh, calc(100vw * 9/16));
  background:#000;
  overflow:hidden;
}

.stage{
  position:absolute;
  inset:0;
  background: radial-gradient(ellipse at 50% 40%, var(--teal-mid) 0%, var(--teal-deep) 50%, var(--teal-darker) 100%);
}

.stage::before{
  content:"";
  position:absolute;inset:0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(245,200,66,0.04) 0%, transparent 50%);
  pointer-events:none;
  z-index:1;
}
.stage::after{
  content:"";
  position:absolute;inset:0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events:none;
  mix-blend-mode:overlay;
  z-index:2;
  opacity:0.5;
}

/* Sparkles */
.sparkles{
  position:absolute;inset:0;
  pointer-events:none;z-index:5;
}
.sp{
  position:absolute;
  color:var(--gold);
  font-size:14px;
  opacity:0;
  animation: twinkle 3s ease-in-out infinite;
}
.sp:nth-child(1){left:8%;top:15%;animation-delay:0s}
.sp:nth-child(2){left:92%;top:20%;animation-delay:0.7s;font-size:10px}
.sp:nth-child(3){left:15%;top:80%;animation-delay:1.4s;font-size:12px}
.sp:nth-child(4){left:88%;top:75%;animation-delay:2.1s}
.sp:nth-child(5){left:50%;top:8%;animation-delay:0.4s;font-size:9px}
.sp:nth-child(6){left:5%;top:50%;animation-delay:1.8s;font-size:11px}
.sp:nth-child(7){left:95%;top:50%;animation-delay:1.0s;font-size:10px}
@keyframes twinkle{
  0%,100%{opacity:0;transform:scale(0) rotate(0deg)}
  50%{opacity:0.8;transform:scale(1) rotate(180deg)}
}

/* HUD */
.hud-top{
  position:absolute;
  top:24px;left:32px;
  z-index:50;
  display:flex;align-items:center;gap:12px;
  opacity:0;
  animation: hudIn 1.2s ease-out 1s forwards;
}
@keyframes hudIn{
  from{opacity:0;transform:translateX(-20px)}
  to{opacity:1;transform:translateX(0)}
}
.hud-logo{
  width:42px;height:42px;
  position:relative;
}
.hud-logo img{
  width:100%;height:100%;
  object-fit:contain;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
}
.hud-text{
  color:#fff;
  font-weight:900;
  letter-spacing:0.18em;
  font-size:15px;
}

.hud-tagline{
  position:absolute;
  top:30px;right:32px;
  z-index:50;
  color:rgba(255,255,255,0.55);
  font-size:10px;
  font-weight:700;
  letter-spacing:0.35em;
  text-transform:uppercase;
  opacity:0;
  animation: hudIn 1.2s ease-out 1.3s forwards;
}

/* Scenes */
.scene{
  position:absolute;
  inset:0;
  z-index:10;
  opacity:0;
  pointer-events:none;
}
.scene-inner{
  width:100%;height:100%;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}

/* TIMELINE total = 32s
   Act 1 (Title + flight): 0–5s     -> 0–15.6%
   Act 2 (Top-down mixing): 5–13s   -> 15.6–40.6%
   Act 3 (Cart): 13–19s             -> 40.6–59.4%
   Act 4 (Press + slim box): 19–26s -> 59.4–81.3%
   Act 5 (DM order + QR): 26–32s    -> 81.3–100%
*/

/* ════════════════════════════════════════════════ */
/* ACT 1 — TITLE STAMP + FLIGHT PATH                */
/* ════════════════════════════════════════════════ */
.act1{ animation: act1 32s linear infinite }
@keyframes act1{
  0%{opacity:0; transform:scale(0.85)}
  3%{opacity:1; transform:scale(1)}
  14%{opacity:1; transform:scale(1.02)}
  16%{opacity:0; transform:scale(1.15)}
  100%{opacity:0}
}

.title-scene{
  position:relative;
  width:560px;height:480px;
}

/* Flight path overlay - behind the stamp */
.flight-bg{
  position:absolute;
  inset:0;
  z-index:1;
  opacity:0;
  animation: flightBgIn 32s linear infinite;
}
@keyframes flightBgIn{
  0%{opacity:0}
  3%{opacity:1}
  14%{opacity:1}
  16%,100%{opacity:0}
}

.flight-svg{
  width:100%;height:100%;
}

/* Center stamp (the actual logo) */
.title-stamp{
  width:280px;height:280px;
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  z-index:5;
  animation: stampPop 32s linear infinite;
  filter: drop-shadow(0 12px 30px rgba(0,0,0,0.5));
}
@keyframes stampPop{
  0%{transform:translate(-50%,-50%) scale(0.5) rotate(-12deg); opacity:0}
  3%{transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1}
  14%{transform:translate(-50%,-50%) scale(1.05) rotate(2deg); opacity:1}
  16%{transform:translate(-50%,-50%) scale(1.2) rotate(4deg); opacity:0}
  100%{transform:translate(-50%,-50%) scale(1.2) rotate(4deg); opacity:0}
}

.title-stamp svg{
  width:100%;height:100%;
}

/* ════════════════════════════════════════════════ */
/* ACT 2 — TOP-DOWN MIXING                          */
/* ════════════════════════════════════════════════ */
.act2{ animation: act2 32s linear infinite }
@keyframes act2{
  0%,15%{opacity:0; transform:scale(1.1)}
  17%,39%{opacity:1; transform:scale(1)}
  41%,100%{opacity:0; transform:scale(0.95)}
}

.mixing-top{
  position:relative;
  width:520px;height:420px;
  perspective: 1000px;
}

/* The wood/marble counter seen from above */
.counter-top{
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.08), transparent 50%),
    radial-gradient(ellipse at 70% 70%, rgba(0,0,0,0.2), transparent 50%),
    linear-gradient(135deg, #2d2418 0%, #1a1310 100%);
  border-radius: 12px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.7), inset 0 0 100px rgba(0,0,0,0.4);
  overflow:hidden;
}
/* Wood grain */
.counter-top::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(95deg, transparent 0 30px, rgba(120,90,60,0.08) 30px 32px),
    repeating-linear-gradient(95deg, transparent 0 80px, rgba(60,40,20,0.15) 80px 82px);
}

/* The bowl from above - perfect circle */
.bowl-top{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:320px;height:320px;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 35%, #f0f0f0 0%, #b0b0b0 30%, #707070 60%, #3a3a3a 90%, #2a2a2a 100%);
  box-shadow: 0 30px 60px rgba(0,0,0,0.7), inset 0 0 0 8px #d8d8d8, inset 0 0 0 12px #888;
  overflow:hidden;
}
/* Inner bowl rim */
.bowl-top::before{
  content:"";
  position:absolute;
  inset:14px;
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, #5a5a5a 0%, #2a2a2a 70%, #1a1a1a 100%);
  box-shadow: inset 0 0 30px rgba(0,0,0,0.7);
}
/* Highlight */
.bowl-top::after{
  content:"";
  position:absolute;
  top:30px;left:60px;
  width:80px;height:30px;
  background: radial-gradient(ellipse, rgba(255,255,255,0.25) 0%, transparent 70%);
  border-radius:50%;
  filter: blur(4px);
}

/* Dough inside - grows over time, viewed from top */
.dough-top{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%) scale(0);
  width:240px;height:240px;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%, #fef0c8 0%, transparent 35%),
    radial-gradient(circle at 70% 60%, var(--caramel) 0%, transparent 25%),
    radial-gradient(circle at 50% 50%, var(--dough) 0%, var(--dough-shadow) 100%);
  z-index:2;
  animation: doughGrowTop 32s linear infinite;
}
@keyframes doughGrowTop{
  0%,18%{transform:translate(-50%,-50%) scale(0)}
  22%{transform:translate(-50%,-50%) scale(0.4)}
  28%{transform:translate(-50%,-50%) scale(0.7)}
  34%{transform:translate(-50%,-50%) scale(0.9)}
  39%{transform:translate(-50%,-50%) scale(0.92)}
  41%,100%{transform:translate(-50%,-50%) scale(0.92)}
}

/* Pearl sugar dotted across dough */
.pearls-top{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:220px;height:220px;
  z-index:3;
  opacity:0;
  animation: pearlsTopShow 32s linear infinite;
  pointer-events:none;
}
@keyframes pearlsTopShow{
  0%,33%{opacity:0}
  36%,39%{opacity:1}
  41%,100%{opacity:0}
}
.pearls-top span{
  position:absolute;
  width:8px;height:8px;
  background: radial-gradient(circle at 30% 30%, #fff 0%, var(--pearl) 60%, #d8c890 100%);
  border-radius:50%;
  box-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.pearls-top span:nth-child(1){left:30%;top:25%}
.pearls-top span:nth-child(2){left:60%;top:20%}
.pearls-top span:nth-child(3){left:75%;top:50%}
.pearls-top span:nth-child(4){left:50%;top:40%}
.pearls-top span:nth-child(5){left:25%;top:55%}
.pearls-top span:nth-child(6){left:65%;top:65%}
.pearls-top span:nth-child(7){left:40%;top:70%}
.pearls-top span:nth-child(8){left:55%;top:80%}
.pearls-top span:nth-child(9){left:80%;top:35%}
.pearls-top span:nth-child(10){left:20%;top:40%}

/* Whisk from above - circular spinning */
.whisk-top{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:120px;height:120px;
  z-index:4;
  opacity:0;
  animation: whiskShow 32s linear infinite;
}
@keyframes whiskShow{
  0%,17%{opacity:0; transform:translate(-50%,-50%) scale(0)}
  19%{opacity:1; transform:translate(-50%,-50%) scale(1)}
  35%{opacity:1; transform:translate(-50%,-50%) scale(1)}
  37%{opacity:0; transform:translate(-50%,-50%) scale(0)}
  100%{opacity:0}
}

.whisk-rotor{
  width:100%;height:100%;
  animation: whiskRotate 0.5s linear infinite;
}
@keyframes whiskRotate{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

/* Mixing trail circles */
.mix-trail{
  position:absolute;
  left:50%;top:50%;
  border:2px solid rgba(255,255,255,0.3);
  border-radius:50%;
  transform:translate(-50%,-50%);
  z-index:3;
  opacity:0;
}
.mt1{ animation: mixTrail 32s linear infinite }
.mt2{ animation: mixTrail 32s linear infinite; animation-delay: -0.3s }
.mt3{ animation: mixTrail 32s linear infinite; animation-delay: -0.6s }
@keyframes mixTrail{
  0%,20%{opacity:0; width:40px;height:40px;}
  22%{opacity:0.6; width:60px;height:60px;}
  28%{opacity:0.3; width:160px;height:160px;}
  32%{opacity:0; width:200px;height:200px;}
  100%{opacity:0; width:200px;height:200px;}
}

/* Ingredients flying in from edges - top-down */
.ing-top{
  position:absolute;
  z-index:5;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  opacity:0;
}
.ing-top .ing-label{
  background:var(--gold);
  color:var(--teal-deep);
  font-size:9px;
  font-weight:900;
  letter-spacing:0.15em;
  padding:3px 8px;
  border-radius:10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  white-space:nowrap;
  text-transform:uppercase;
  border:1.5px solid var(--teal-deep);
}
.ing-top .ing-shape{
  width:36px;height:36px;
  border-radius:50%;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}

/* Each ingredient flies from off-edge to bowl center along a path */
/* Bowl is at center: left 50% top 50% of mixing-top container */
/* Container is 520x420, so bowl center is at (260, 210) px */

.ingt-1 .ing-shape{
  background: radial-gradient(circle at 35% 35%, #fff 0%, #f0e8d4 60%, #d4c4a0 100%);
}
.ingt-1{ animation: ingFly1 32s linear infinite; }
@keyframes ingFly1{
  0%,15%{opacity:0; left:-10%; top:20%; transform:rotate(0) scale(1)}
  17%{opacity:1; left:25%; top:30%; transform:rotate(120deg) scale(1)}
  20%{opacity:1; left:48%; top:48%; transform:rotate(240deg) scale(0.4)}
  21%,100%{opacity:0; left:48%; top:50%; transform:rotate(360deg) scale(0)}
}

.ingt-2 .ing-shape{
  background: radial-gradient(circle at 35% 35%, #fff 0%, #fff8e8 70%, #f5deb3 100%);
  width:30px;height:38px;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
}
.ingt-2{ animation: ingFly2 32s linear infinite; }
@keyframes ingFly2{
  0%,18%{opacity:0; right:-10%; top:15%; transform:rotate(0) scale(1)}
  20%{opacity:1; right:25%; top:30%; transform:rotate(-120deg) scale(1)}
  23%{opacity:1; right:48%; top:48%; transform:rotate(-240deg) scale(0.4)}
  24%,100%{opacity:0; right:48%; top:50%; transform:rotate(-360deg) scale(0)}
}

.ingt-3 .ing-shape{
  background: linear-gradient(135deg, #fef3a0 0%, #f5d76e 100%);
  width:42px;height:28px;
  border-radius:6px;
}
.ingt-3{ animation: ingFly3 32s linear infinite; }
@keyframes ingFly3{
  0%,21%{opacity:0; left:-10%; top:75%; transform:rotate(0) scale(1)}
  23%{opacity:1; left:25%; top:60%; transform:rotate(180deg) scale(1)}
  26%{opacity:1; left:48%; top:50%; transform:rotate(360deg) scale(0.4)}
  27%,100%{opacity:0; left:48%; top:50%; transform:rotate(360deg) scale(0)}
}

.ingt-4 .ing-shape{
  width:50px;height:30px;
  background:transparent;
  position:relative;
}
.ingt-4 .ing-shape::before{
  content:"";
  position:absolute;
  width:8px;height:8px;
  background: radial-gradient(circle at 30% 30%, #fff 0%, var(--pearl) 70%, #d8c890 100%);
  border-radius:50%;
  left:6px;top:4px;
  box-shadow:
    14px 4px 0 -1px #fff,
    26px -2px 0 -1px var(--pearl),
    8px 18px 0 -1px var(--pearl),
    22px 16px 0 -1px #fff,
    34px 12px 0 -1px var(--pearl),
    34px 22px 0 -1px #fff;
}
.ingt-4{ animation: ingFly4 32s linear infinite; }
@keyframes ingFly4{
  0%,24%{opacity:0; right:-10%; top:75%; transform:rotate(0) scale(1)}
  26%{opacity:1; right:25%; top:60%; transform:rotate(-100deg) scale(1)}
  29%{opacity:1; right:48%; top:50%; transform:rotate(-220deg) scale(0.4)}
  30%,100%{opacity:0; right:48%; top:50%; transform:rotate(-220deg) scale(0)}
}

.ingt-5 .ing-shape{
  width:34px;height:34px;
  background: radial-gradient(circle at 30% 30%, #d4985c 0%, #a06a30 100%);
  border-radius:8px;
}
.ingt-5{ animation: ingFly5 32s linear infinite; }
@keyframes ingFly5{
  0%,27%{opacity:0; left:-10%; top:50%; transform:rotate(0) scale(1)}
  29%{opacity:1; left:25%; top:50%; transform:rotate(180deg) scale(1)}
  32%{opacity:1; left:48%; top:50%; transform:rotate(360deg) scale(0.4)}
  33%,100%{opacity:0; left:48%; top:50%; transform:rotate(360deg) scale(0)}
}

.ingt-6 .ing-shape{
  width:28px;height:42px;
  background: linear-gradient(180deg, #fff 0%, #f4f4f4 100%);
  border-radius: 4px 4px 8px 8px;
  border:1px solid #e8e8e8;
}
.ingt-6 .ing-shape::before{
  content:"";
  position:absolute;
  top:-3px;left:7px;
  width:14px;height:6px;
  background:var(--teal-deep);
  border-radius:2px 2px 0 0;
}
.ingt-6{ animation: ingFly6 32s linear infinite; }
@keyframes ingFly6{
  0%,30%{opacity:0; right:-10%; top:50%; transform:rotate(0) scale(1)}
  32%{opacity:1; right:25%; top:50%; transform:rotate(-180deg) scale(1)}
  35%{opacity:1; right:48%; top:50%; transform:rotate(-360deg) scale(0.4)}
  36%,100%{opacity:0; right:48%; top:50%; transform:rotate(-360deg) scale(0)}
}

/* ════════════════════════════════════════════════ */
/* ACT 3 — THE CART (rebuilt)                       */
/* ════════════════════════════════════════════════ */
.act3{ animation: act3 32s linear infinite }
@keyframes act3{
  0%,40%{opacity:0; transform:scale(1.15)}
  43%,57%{opacity:1; transform:scale(1)}
  59%,100%{opacity:0; transform:scale(0.95)}
}

.cart-scene{
  position:relative;
  width:820px;
  height:560px;
}

/* Ground/cobblestones */
.ground{
  position:absolute;
  bottom:0;left:0;right:0;
  height:90px;
  background: linear-gradient(180deg, #2a2520 0%, #1a1612 100%);
  z-index:1;
}
.ground::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 50px 14px at 10% 30%, #3a3530 0%, transparent 70%),
    radial-gradient(ellipse 50px 14px at 35% 50%, #3a3530 0%, transparent 70%),
    radial-gradient(ellipse 50px 14px at 60% 30%, #3a3530 0%, transparent 70%),
    radial-gradient(ellipse 50px 14px at 85% 50%, #3a3530 0%, transparent 70%),
    radial-gradient(ellipse 50px 14px at 22% 70%, #3a3530 0%, transparent 70%),
    radial-gradient(ellipse 50px 14px at 50% 80%, #3a3530 0%, transparent 70%),
    radial-gradient(ellipse 50px 14px at 78% 70%, #3a3530 0%, transparent 70%);
}

/* Lamp glow from above */
.lamp-glow{
  position:absolute;
  top:0;left:50%;
  transform:translateX(-50%);
  width:700px;height:500px;
  background: radial-gradient(ellipse at center top, rgba(245,200,66,0.2) 0%, transparent 60%);
  pointer-events:none;
  z-index:1;
}

/* The full cart structure - rebuilt properly */
.cart-v2{
  position:absolute;
  bottom:50px;left:50%;
  transform:translateX(-50%);
  width:640px;
  z-index:5;
  animation: cartRoll 32s linear infinite;
}
@keyframes cartRoll{
  0%,40%{transform:translateX(-50%) translateY(40px); opacity:0}
  43%{transform:translateX(-50%) translateY(0); opacity:1}
  57%{transform:translateX(-50%) translateY(0); opacity:1}
  59%,100%{transform:translateX(-50%) translateY(-20px); opacity:0}
}

/* AWNING — top, with proper structure: roof + scallops + posts */
.awning-roof{
  position:absolute;
  top:0;left:50%;
  transform:translateX(-50%);
  width:600px;
  z-index:3;
}
.awning-stripes{
  height:40px;
  background:repeating-linear-gradient(90deg,
    var(--teal) 0 32px,
    #fff 32px 64px);
  border-radius: 12px 12px 4px 4px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.4), inset 0 -4px 8px rgba(0,0,0,0.2);
  border-top: 3px solid var(--teal-deep);
}
.awning-trim{
  height:6px;
  background: var(--teal-deep);
  margin-top:-1px;
}
.awning-scallop{
  display:flex;
  height:24px;
  margin-top:-1px;
}
.awning-scallop span{
  flex:1;
  border-radius: 0 0 50% 50%;
  margin-right:1px;
  position:relative;
}
.awning-scallop span:nth-child(odd){background: var(--teal)}
.awning-scallop span:nth-child(even){background: #fff}
.awning-scallop span::after{
  content:"";
  position:absolute;
  bottom:2px;left:50%;
  transform:translateX(-50%);
  width:4px;height:4px;
  background: var(--teal-deep);
  border-radius:50%;
}

/* Vertical posts holding awning */
.post{
  position:absolute;
  width:8px;height:90px;
  background: linear-gradient(90deg, #c8c8c8 0%, #fff 50%, #c8c8c8 100%);
  border-radius:4px;
  box-shadow: 2px 0 4px rgba(0,0,0,0.3);
  z-index:2;
}
.post-l{ top:60px; left:50px; }
.post-r{ top:60px; right:50px; }

@keyframes act4{
  0%,57%{opacity:0; transform:scale(0.92)}
  60%,80%{opacity:1; transform:scale(1)}

}

/* The slim box — one cohesive SVG illustration */

  78%{opacity:1; transform:translateX(-50%) translateY(0) scale(1)}

}
.dm-foot-text{
  color:rgba(255,255,255,0.6);
  font-size:10px;
  font-weight:700;
  letter-spacing:0.4em;
  text-transform:uppercase;
}

/* Vignette */
.vignette{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:90;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
}

/* Progress timeline */
.timeline{
  position:absolute;
  bottom:14px;left:50%;
  transform:translateX(-50%);
  z-index:60;
  display:flex;gap:6px;
  padding:6px 12px;
  background:rgba(0,0,0,0.4);
  border-radius:12px;
  backdrop-filter: blur(6px);
}
.tl-dot{
  width:24px;height:3px;
  background:rgba(255,255,255,0.2);
  border-radius:2px;
  position:relative;
  overflow:hidden;
}
.tl-dot::after{
  content:"";
  position:absolute;inset:0;
  background:var(--gold);
  transform:translateX(-100%);
}
/* 5 dots, each filling during its act */
.tl-dot:nth-child(1)::after{ animation: tl1 32s linear infinite }
.tl-dot:nth-child(2)::after{ animation: tl2 32s linear infinite }
.tl-dot:nth-child(3)::after{ animation: tl3 32s linear infinite }
.tl-dot:nth-child(4)::after{ animation: tl4 32s linear infinite }
.tl-dot:nth-child(5)::after{ animation: tl5 32s linear infinite }

@keyframes tl1{ 0%{transform:translateX(-100%)} 15.6%{transform:translateX(0)} 100%{transform:translateX(0)} }
@keyframes tl2{ 0%,15.6%{transform:translateX(-100%)} 40.6%{transform:translateX(0)} 100%{transform:translateX(0)} }
@keyframes tl3{ 0%,40.6%{transform:translateX(-100%)} 59.4%{transform:translateX(0)} 100%{transform:translateX(0)} }
@keyframes tl4{ 0%,59.4%{transform:translateX(-100%)} 81.3%{transform:translateX(0)} 100%{transform:translateX(0)} }
@keyframes tl5{ 0%,81.3%{transform:translateX(-100%)} 100%{transform:translateX(0)} }

/* ════════════════════════════════════════════════ */
/* RESPONSIVE — TABLET & MOBILE                     */
/* ════════════════════════════════════════════════ */

/*
  Strategy:
  • On portrait orientation, the film fills the full viewport (no 16:9 letterbox).
  • Inner scenes are scaled down via transform: scale() so the same pixel-precise
    artwork fits on smaller widths.
  • Act 5 (DM order) switches to a vertical stacked layout on portrait.
  • HUD and tagline shrink/hide on the smallest screens.
*/

/* PORTRAIT — let film fill the screen instead of forcing 16:9 letterboxing */
@media (orientation: portrait){
  .film{
    width: 100vw;
    height: 100vh;
  }
}

/* TABLET PORTRAIT — 600px to 900px wide */
@media (orientation: portrait) and (max-width: 900px){
  /* Each scene's inner container scales to fit available width (~720px native → ~80% on iPad) */
  .title-scene{ transform: scale(0.85); }
  .mixing-top{ transform: scale(0.85); }
  .cart-scene{ transform: scale(0.78); }
  .box-scene{ transform: scale(0.85); }

  /* Slightly smaller HUD */
  .hud-top{ top:18px; left:20px; }
  .hud-logo{ width:34px; height:34px; }
  .hud-text{ font-size:13px; }
  .hud-tagline{ top:24px; right:20px; font-size:9px; letter-spacing:0.25em; }
}

/* MOBILE PORTRAIT — under 600px wide */
@media (orientation: portrait) and (max-width: 600px){
  /* Aggressive scaling so scenes fit narrow phone widths */
  .title-scene{ transform: scale(0.62); }
  .mixing-top{ transform: scale(0.65); }
  .cart-scene{ transform: scale(0.55); }
  .box-scene{ transform: scale(0.62); }

  /* HUD shrinks further; tagline hides on tiniest screens */
  .hud-top{ top:14px; left:14px; gap:8px; }
  .hud-logo{ width:28px; height:28px; }
  .hud-text{ font-size:11px; letter-spacing:0.15em; }
  .hud-tagline{ display:none; }

  /* Timeline gets smaller and tucks at the very bottom */
  .timeline{ bottom:10px; padding:5px 8px; gap:4px; }
  .tl-dot{ width:18px; height:2px; }

  /* Act 5 — stack vertically on mobile portrait */
  .dm-scene{
    width: 92vw;
    max-width: 420px;
    height: auto;
    gap: 18px;
    padding: 20px 0;
  }
  .dm-logo{ width:80px; height:80px; }
  .dm-eyebrow{ font-size:10px; letter-spacing:0.4em; }
  .dm-title{ font-size: clamp(28px, 9vw, 40px); letter-spacing:0.06em; }
  .dm-info{
    flex-direction: column;
    gap: 18px;
    align-items: center;
  }
  .qr-wrap{ width:150px; height:150px; }
  .qr-label{ font-size:8px; padding:2px 8px; }
  .ig-block{ align-items:center; }
  .ig-handle{ padding:10px 16px; gap:10px; }
  .ig-icon{ width:32px; height:32px; }
  .ig-icon svg{ width:18px; height:18px; }
  .ig-handle-name{ font-size:16px; }
  .ig-handle-url{ font-size:9px; }
  .cta-button{ font-size:12px; padding:10px 20px; letter-spacing:0.18em; }
  .dm-foot{
    flex-wrap: wrap;
    justify-content:center;
    gap:8px;
    padding: 0 16px;
    text-align:center;
  }
  .dm-foot-text{ font-size:9px; letter-spacing:0.25em; }

  /* Hide some sparkles on mobile (less visual noise on small canvas) */
  .sp:nth-child(2),
  .sp:nth-child(4),
  .sp:nth-child(7){ display:none; }
}

/* VERY SMALL PHONES — under 380px (iPhone SE etc.) */
@media (orientation: portrait) and (max-width: 380px){
  .title-scene{ transform: scale(0.55); }
  .mixing-top{ transform: scale(0.58); }
  .cart-scene{ transform: scale(0.48); }
  .box-scene{ transform: scale(0.55); }

  .dm-scene{ gap:14px; padding:14px 0; }
  .dm-logo{ width:70px; height:70px; }
  .dm-title{ font-size: clamp(24px, 8.5vw, 34px); }
  .qr-wrap{ width:130px; height:130px; }
}

/* LANDSCAPE PHONE / SHORT VIEWPORTS — keep 16:9 but scale content */
@media (orientation: landscape) and (max-height: 500px){
  .title-scene{ transform: scale(0.7); }
  .mixing-top{ transform: scale(0.7); }
  .cart-scene{ transform: scale(0.65); }
  .box-scene{ transform: scale(0.7); }
  .dm-scene{ transform: scale(0.78); }

  .hud-top{ top:12px; left:14px; }
  .hud-logo{ width:30px; height:30px; }
  .hud-text{ font-size:11px; }
  .hud-tagline{ top:16px; right:14px; font-size:8px; }
}

</style>
